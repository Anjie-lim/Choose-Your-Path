<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conversation Quality VN</title>

<style>
body {
  margin: 0;
  background: #0b0f14;
  font-family: Arial, sans-serif;
  color: white;
}

#home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.levelBtn {
  width: 300px;
  padding: 14px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
  background: #1c2430;
  border: 1px solid #2c3544;
  color: white;
  border-radius: 10px;
}

#game {
  display: none;
  height: 100vh;
  flex-direction: column;
}

#scene {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at center, #1a2230, #0b0f14);
  position: relative;
}

#portrait {
  width: 280px;
  height: 280px;
  border-radius: 20px;
  border: 2px solid #333;
  object-fit: cover;
  background: #111;
}

#title {
  position: absolute;
  top: 16px;
  left: 16px;
  opacity: 0.6;
  font-size: 13px;
}

#dialogue {
  height: 260px;
  background: rgba(10,14,20,0.95);
  border-top: 2px solid #2a2f3a;
  padding: 16px;
  box-sizing: border-box;
}

#prompt {
  font-size: 18px;
  margin-bottom: 10px;
  color: #d7e2ff;
}

.choiceBtn {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  background: #1c2430;
  border: 1px solid #2c3544;
  color: white;
  cursor: pointer;
  text-align: left;
  border-radius: 8px;
}

#end {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.endBtn {
  margin-top: 10px;
  padding: 10px 14px;
  background: #1c2430;
  border: 1px solid #2c3544;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="home">
  <h1>Conversation Quality VN</h1>
  <button class="levelBtn" onclick="start(0)">Level 1: Alien Visitor</button>
  <button class="levelBtn" onclick="start(1)">Level 2: Time Traveler</button>
  <button class="levelBtn" onclick="start(2)">Level 3: Cooking Judge</button>
</div>

<div id="game">
  <div id="scene">
    <div id="title"></div>
    <img id="portrait" />

    <div id="end">
      <h2>Level Complete</h2>
      <div id="scoreBox"></div>
      <button class="endBtn" id="nextBtn" onclick="next()">Continue</button>
      <button class="endBtn" onclick="retryLevel()">Retry Level</button>
      <button class="endBtn" onclick="home()">Home</button>
    </div>
  </div>

  <div id="dialogue">
    <div id="prompt"></div>
    <div id="choices"></div>
  </div>
</div>

<script>
const levels = [
{
name:"Alien Visitor",
nodes:[
{prompt:"so where are you visiting from? You have a bit of an accent I can't place.",img:"images/alien_1.png",
choices:[
{t:"Honestly? Further than you'd guess. I've been trying to get the hang of saying 'th' sounds - my mouth wants to do something else entirely",s:10},
{t:"I'm from a small town, not far from here. People say I have an accent but I don't really notice it",s:5},
{t:"That's such a great question! I'd love to share more about where I'm from.",s:0}
]},
{prompt:"Okay, mystery person. What’s the weirdest thing about Earth so far?",img:"images/alien_2.png",
choices:[
{t:"Honestly, the fact that you have a holiday specifically for being scared.",s:10},
{t:"Probably the food. There's just so much variety.",s:5},
{t:"There are honestly so many fascinating things about Earth.",s:0}
]},
{prompt:"Be honest - are you even from this planet?",img:"images/alien_3.png",
choices:[
{t:"Define 'this planet.' Okay, fine, I'll let you keep wondering.",s:10},
{t:"Haha, no, I'm from Earth.",s:5},
{t:"That's such an interesting question to ask!",s:0}
]}
]},
{
name:"Time Traveler",
nodes:[
{prompt:"Nice jacket. Never seen a cut like that before. Where'd you get it?",img:"images/time_1.png",
choices:[
{t:"Honestly, it was a gift. I'm starting to think I should've dressed less loudly.",s:10},
{t:"Just a store back home.",s:5},
{t:"Thank you so much for noticing!",s:0}
]},
{prompt:"You've got a funny way of talking too.",img:"images/time_2.png",
choices:[
{t:"Let's just say I've traveled more than most.",s:10},
{t:"Just how I talk.",s:5},
{t:"Everyone has a unique way of speaking.",s:0}
]},
{prompt:"You ever hear what's gonna happen with prohibition?",img:"images/time_3.png",
choices:[
{t:"My money's on it not lasting as long as people think.",s:10},
{t:"I couldn't say.",s:5},
{t:"It's important to consider all perspectives.",s:0}
]}
]},
{
name:"Cooking Judge",
nodes:[
{prompt:"What do you think of my deconstructed lasagna?",img:"images/chef_1.png",
choices:[
{t:"The flavors are there, but deconstructing it hurts what makes lasagna work.",s:10},
{t:"It's good. Nice job.",s:5},
{t:"Every dish tells a story.",s:0}
]},
{prompt:"If you could change one thing?",img:"images/chef_2.png",
choices:[
{t:"I'd cut the basil oil drizzle.",s:10},
{t:"Maybe tweak the seasoning.",s:5},
{t:"Keep experimenting and believing in yourself.",s:0}
]},
{prompt:"Could it win the competition?",img:"images/chef_3.png",
choices:[
{t:"Not in this form, but it's close.",s:10},
{t:"Maybe. Hard to say.",s:5},
{t:"I truly believe every contestant can win.",s:0}
]}
]}
];

let level=0,node=0,score=0;

function start(i){
 level=i; node=0; score=0;
 document.getElementById("end").style.display="none";
 document.getElementById("home").style.display="none";
 document.getElementById("game").style.display="flex";
 render();
}

function home(){
 document.getElementById("end").style.display="none";
 level=0; node=0; score=0;
 document.getElementById("home").style.display="flex";
 document.getElementById("game").style.display="none";
}

function retryLevel(){
 document.getElementById("end").style.display="none";
 node=0; score=0;
 render();
}

function render(){
 const L=levels[level];
 const N=L.nodes[node];

 title.innerText=L.name;
 portrait.src=N.img;
 prompt.innerText=N.prompt;

 const choices=document.getElementById("choices");
 choices.innerHTML="";

 N.choices.forEach(c=>{
   const b=document.createElement("button");
   b.className="choiceBtn";
   b.innerText=c.t;
   b.onclick=()=>{
      score+=c.s;
      node++;
      if(node>=L.nodes.length) end();
      else render();
   };
   choices.appendChild(b);
 });
}

function end(){
 document.getElementById("end").style.display="flex";

 let titleText="";
 let feedback="";

 if(score>=25){
   titleText="Excellent";
   feedback="You consistently picked responses that felt human: specific, opinionated, and grounded in the scenario’s reality without overclaiming or making things up.";
 }else if(score>=15){
   titleText="Mixed Bag";
   feedback="Some picks were genuinely engaging, others played it too safe. Notice where you picked the middle-ground responses — what made them feel fine but forgettable?";
 }else{
   titleText="Slop Alert";
   feedback="Several picks leaned on generic enthusiasm or hedging instead of substance. These are the patterns to watch for when reviewing AI-generated conversations.";
 }

 document.getElementById("scoreBox").innerHTML =
   "<strong>Score:</strong> "+score+"/30<br><br><strong>"+titleText+"</strong><br><br>"+feedback;

 document.getElementById("nextBtn").innerText =
   level < levels.length-1 ? "Next Level" : "Finish";
}

function next(){
 document.getElementById("end").style.display="none";
 if(level < levels.length-1) start(level+1);
 else home();
}
</script>
</body>
</html>
