<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conversation Quality VN</title>

<style>
body {
  margin: 0;
  background: #0b0f14;
  font-family: Arial, sans-serif;
  color: white;
}

#home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.levelBtn {
  width: 300px;
  padding: 14px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
  background: #1c2430;
  border: 1px solid #2c3544;
  color: white;
  border-radius: 10px;
}

#game {
  display: none;
  height: 100vh;
  flex-direction: column;
}

#scene {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at center, #1a2230, #0b0f14);
  position: relative;
}

#portrait {
  width: 280px;
  height: 280px;
  border-radius: 20px;
  border: 2px solid #333;
  object-fit: cover;
  background: #111;
}

#title {
  position: absolute;
  top: 16px;
  left: 16px;
  opacity: 0.6;
  font-size: 13px;
}

#dialogue {
  background: rgba(10,14,20,0.95);
  border-top: 2px solid #2a2f3a;
  padding: 16px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  max-height: 300px;
  overflow-y: auto;
}

#prompt {
  font-size: 18px;
  margin-bottom: 16px;
  color: #d7e2ff;
  flex-shrink: 0;
  min-height: 50px;
}

#choices {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
}

.choiceBtn {
  width: 100%;
  padding: 10px;
  background: #1c2430;
  border: 1px solid #2c3544;
  color: white;
  cursor: pointer;
  text-align: left;
  border-radius: 8px;
  flex-shrink: 0;
}

.choiceBtn:hover {
  background: #252d3a;
  border-color: #3a4554;
}

#end {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.endBtn {
  margin-top: 10px;
  padding: 10px 14px;
  background: #1c2430;
  border: 1px solid #2c3544;
  color: white;
  cursor: pointer;
  border-radius: 8px;
}

.endBtn:hover {
  background: #252d3a;
}
</style>
</head>
<body>

<div id="home">
  <h1>Conversation Quality VN</h1>
  <button class="levelBtn" onclick="start(0)">Level 1: Alien Visitor</button>
  <button class="levelBtn" onclick="start(1)">Level 2: Time Traveler</button>
  <button class="levelBtn" onclick="start(2)">Level 3: Cooking Judge</button>
</div>

<div id="game">
  <div id="scene">
    <div id="title"></div>
    <img id="portrait" />

    <div id="end">
      <h2>Level Complete</h2>
      <div id="scoreBox"></div>
      <button class="endBtn" id="nextBtn" onclick="next()">Continue</button>
      <button class="endBtn" onclick="retryLevel()">Retry Level</button>
      <button class="endBtn" onclick="home()">Home</button>
    </div>
  </div>

  <div id="dialogue">
    <div id="prompt"></div>
    <div id="choices"></div>
  </div>
</div>

<script>
const levels = [
{
name:"Alien Visitor",
nodes:[
{prompt:"So where are you visiting from? You have a bit of an accent I can't place.",img:"images/alien_1.png",
choices:[
{t:"I'm from a small town, not far from here. People say I have an accent but I don't really notice it",s:5},
{t:"That's such a great question! I'd love to share more about where I'm from.",s:0},
{t:"Honestly? Further than you'd guess. I've been trying to get the hang of saying 'th' sounds - my mouth wants to do something else entirely",s:10}
]},
{prompt:"Okay, mystery person. What's the weirdest thing about Earth so far?",img:"images/alien_2.png",
choices:[
{t:"There are honestly so many fascinating things about Earth.",s:0},
{t:"Honestly, the fact that you have a holiday specifically for being scared.",s:10},
{t:"Probably the food. There's just so much variety.",s:5}
]},
{prompt:"Be honest - are you even from this planet?",img:"images/alien_3.png",
choices:[
{t:"That’s such an interesting question to ask! While I can’t speak to where everyone is
from, I think what matters most is the connections we make, don’t you think?",s:0},
{t:"Define 'this planet.' Okay, fine, I'll let you keep wondering.But for the record, your
coffee is genuinely one of the best things about Earth so far.",s:10},
{t:"Haha, no, I’m from Earth, just a different part. Why do you ask?",s:5}
]}
]},
{
name:"Time Traveler",
nodes:[
{prompt:"Nice jacket. Never seen a cut like that before. Where'd you get it?",img:"images/time_1.png",
choices:[
{t:"Thank you so much for noticing!I really appreciate compliments like that — it means
a lot to me!",s:0},
{t:"Oh, just a store back home. I don’t remember which one.",s:5},
{t:"Honestly, it was a gift. — I didn’t pick it out myself. I’m starting to think I should’ve
dressed a little less… loud, though, judging by the look you just gave me.",s:10}
]},
{prompt:"You've got a funny way of talking too. You’re not one of those folks from
out west, are you?",img:"images/time_2.png",
choices:[
{t:"That’s a really interesting observation! Everyone has their own unique way of
speaking, and I think that’s something to be celebrated!",s:0},
{t:"Something like that — let’s just say I’ve traveled more than most.",s:10},
{t:"No, I’m not from out west. I just talk like this normally.",s:5}
]},
{prompt:"Say, you ever hear what’s gonna happen with all this prohibition
business? Feels like it could go on forever.",img:"images/time_3.png",
choices:[
{t:"That’s such a thought-provoking question! While I can’t predict the future, I think it’s
important to consider all perspectives on big societal issues like this one.",s:0},
{t:"I don’t really know much about politics, so I couldn’t say.",s:5},
{t:"My money's on it not lasting as long as people think. Probably gone within
the decade — mark my words.",s:10}
]}
]},
{
name:"Cooking Judge",
nodes:[
{prompt:"What do you think of my 'no pasta' penne pasta?",img:"images/chef_1.png",
choices:[
{t:"It's good. Nice job.",s:5},
{t:"Wow, what an incredible dish! I can really tell you put so much heart and effort into
this, and that’s what cooking is all about! Every dish tells a story.",s:0},
{t:"The flavors are there — the ricotta filling especially is really well-seasoned. But
honestly, calling it ‘no pasta’ feels like it’s working against you here; penne pasta’s
whole appeal is the pasta together with the beef, and I miss that.",s:10}
]},
{prompt:"If you could change one thing, what would it be?",img:"images/chef_2.png",
choices:[
{t:"That’s a great question! I think every dish has room to grow, and the most important
thing is that you keep experimenting and believing in yourself!",s:0},
{t:"I’d cut the basil oil drizzle — on its own it’s great, but it’s fighting with the tomato
sauce for attention. Pick one star and let it shine.",s:10},
{t:"Maybe tweak the seasoning.",s:5}
]},
{prompt:"Last question - does it feel like this dish could win the competition?",img:"images/chef_3.png",
choices:[
{t:"Maybe. Hard to say.",s:5},
{t:"I truly believe every contestant can win. And your passion really
shines through in this dish! Keep believing in yourself!",s:0},
{t:"Not in this form, but it's close. It needs that one fix we talked about. But the bones of
it, the seasoning and the beef itself, those are competition-level. Fix the composition
and you’ve got something real.",s:10}
]}
]}
];

let level=0,node=0,score=0;

function start(i){
 level=i; node=0; score=0;
 document.getElementById("end").style.display="none";
 document.getElementById("home").style.display="none";
 document.getElementById("game").style.display="flex";
 render();
}

function home(){
 document.getElementById("end").style.display="none";
 level=0; node=0; score=0;
 document.getElementById("home").style.display="flex";
 document.getElementById("game").style.display="none";
}

function retryLevel(){
 document.getElementById("end").style.display="none";
 node=0; score=0;
 render();
}

function render(){
 const L=levels[level];
 const N=L.nodes[node];

 document.getElementById("title").innerText=L.name;
 document.getElementById("portrait").src=N.img;
 document.getElementById("prompt").innerText=N.prompt;

 const choices=document.getElementById("choices");
 choices.innerHTML="";

 N.choices.forEach(c=>{
   const b=document.createElement("button");
   b.className="choiceBtn";
   b.innerText=c.t;
   b.onclick=()=>{
      score+=c.s;
      node++;
      if(node>=L.nodes.length) end();
      else render();
   };
   choices.appendChild(b);
 });
}

function end(){
 document.getElementById("end").style.display="flex";

 let titleText="";
 let feedback="";

 if(score>=25){
   titleText="Excellent";
   feedback="You consistently picked responses that felt human: specific, opinionated, and grounded in the scenario's reality without overclaiming or making things up.";
 }else if(score>=15){
   titleText="Mixed Bag";
   feedback="Some picks were genuinely engaging, others played it too safe. Notice where you picked the middle-ground responses — what made them feel fine but forgettable?";
 }else{
   titleText="Slop Alert";
   feedback="Several picks leaned on generic enthusiasm or hedging instead of substance. These are the patterns to watch for when reviewing AI-generated conversations.";
 }

 document.getElementById("scoreBox").innerHTML =
   "<strong>Score:</strong> "+score+"/30<br><br><strong>"+titleText+"</strong><br><br>"+feedback;

 document.getElementById("nextBtn").innerText =
   level < levels.length-1 ? "Next Level" : "Finish";
}

function next(){
 document.getElementById("end").style.display="none";
 if(level < levels.length-1) start(level+1);
 else home();
}
</script>
</body>
</html>
